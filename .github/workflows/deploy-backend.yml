# 事前準備: このワークフローを動かす前に、GitHubリポジトリの Settings > Secrets and variables > Actions で
# 以下のシークレットを登録しておくこと。
#   - AWS_GITHUB_ACTIONS_ROLE_ARN: arn:aws:iam::533267300159:role/trainingmemo-github-actions-deploy
#     (infra/bootstrap/ で terraform apply 済みのOIDC用IAMロール)
#   - DB_DATABASE: RDS(training-memo)上の実際のデータベース名
#   - DB_PASSWORD: RDS(training-memo)のマスターパスワード
#   - APP_KEY: 既存EC2の .env と同じ値(暗号化データ/セッションの互換性のため必ず同一にすること)
#   - MAIL_PASSWORD: Gmail(trainingMemoApp@gmail.com)のアプリパスワード(お問い合わせ/パスワードリセットメール送信用)
#   - GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET: Google OAuthログイン用のクライアント情報
#
# S3バケット名 `trainingmemo-spa-frontend` / Lambda関数名 `trainingmemo-laravel-app` / `trainingmemo-laravel-artisan` は
# infra/terraform/modules/backend_lambda/main.tf (aws_lambda_function.app / aws_lambda_function.artisan の function_name)
# および infra/terraform/envs/production/main.tf (module.backend_lambda.deploy_bucket = module.frontend_bucket.bucket_id)
# と一致させていること。
#
# artisan コマンドの実行は HTTP リクエスト処理用の Lambda 関数(trainingmemo-laravel-app, handler = "public/index.php")
# ではなく、コンソール実行専用の Lambda 関数(trainingmemo-laravel-artisan, handler = "artisan")に対して行う。
# 両関数とも同じデプロイパッケージ(zip)を使うため、デプロイ時は両方の関数コードを更新する必要がある。
#
# DB_PASSWORD/APP_KEY等の機密値はTerraformでは管理せず(state内に平文で残るのを避けるため)、
# このワークフローがGitHub Secretsから読み取り、都度 aws lambda update-function-configuration で設定する。
# (infra/terraform/modules/backend_lambda/main.tf 側は lifecycle.ignore_changes で environment を追跡除外している)

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/app/**'
      - 'src/routes/**'
      - 'src/composer.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - run: composer install --no-dev --optimize-autoloader --prefer-dist

      - name: Build deployment package
        run: |
          zip -r ../backend.zip . -x "node_modules/*" "tests/*" ".git/*"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Upload deployment package
        run: |
          aws s3 cp ../backend.zip s3://trainingmemo-spa-frontend/backend/${{ github.sha }}.zip

      - name: Update artisan function code
        run: |
          aws lambda update-function-code \
            --function-name trainingmemo-laravel-artisan \
            --s3-bucket trainingmemo-spa-frontend \
            --s3-key backend/${{ github.sha }}.zip
          aws lambda wait function-updated --function-name trainingmemo-laravel-artisan

      - name: Configure Lambda environment variables
        env:
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          # RUNTIME_CLASSを明示しないと、Brefのレイヤー(bootstrap)は
          # デフォルトで Bref\FunctionRuntime\Main を使ってしまう。
          # これはハンドラーファイルをそのままrequireして「返り値」を期待する汎用ランタイムのため、
          # console用のartisan(exit()で終了する素のCLIスクリプト)やHTTP用のpublic/index.phpとは相性が悪く、
          # 期待した ConsoleRuntime / FpmRuntime が使われず、ハングやクラッシュの原因になっていた。
          jq -n \
            --arg db_database "$DB_DATABASE" \
            --arg db_password "$DB_PASSWORD" \
            --arg app_key "$APP_KEY" \
            --arg mail_password "$MAIL_PASSWORD" \
            --arg google_client_id "$GOOGLE_CLIENT_ID" \
            --arg google_client_secret "$GOOGLE_CLIENT_SECRET" \
            '{Variables: {
              APP_ENV: "production",
              APP_URL: "https://training-memo.com",
              SANCTUM_STATEFUL_DOMAINS: "training-memo.com",
              SESSION_DRIVER: "database",
              SESSION_DOMAIN: "training-memo.com",
              CACHE_DRIVER: "database",
              LOG_CHANNEL: "stderr",
              DB_CONNECTION: "mysql",
              DB_HOST: "training-memo.clc4qko0ggkz.ap-northeast-1.rds.amazonaws.com",
              DB_PORT: "3306",
              DB_DATABASE: $db_database,
              DB_USERNAME: "training0512",
              DB_PASSWORD: $db_password,
              APP_KEY: $app_key,
              MAIL_MAILER: "smtp",
              MAIL_HOST: "smtp.gmail.com",
              MAIL_PORT: "587",
              MAIL_USERNAME: "trainingMemoApp@gmail.com",
              MAIL_PASSWORD: $mail_password,
              MAIL_FROM_ADDRESS: "trainingMemoApp@gmail.com",
              MAIL_FROM_NAME: "trainingMemo",
              GOOGLE_CLIENT_ID: $google_client_id,
              GOOGLE_CLIENT_SECRET: $google_client_secret,
              RUNTIME_CLASS: "Bref\\ConsoleRuntime\\Main"
            }}' > /tmp/lambda-env-artisan.json

          jq -n \
            --arg db_database "$DB_DATABASE" \
            --arg db_password "$DB_PASSWORD" \
            --arg app_key "$APP_KEY" \
            --arg mail_password "$MAIL_PASSWORD" \
            --arg google_client_id "$GOOGLE_CLIENT_ID" \
            --arg google_client_secret "$GOOGLE_CLIENT_SECRET" \
            '{Variables: {
              APP_ENV: "production",
              APP_URL: "https://training-memo.com",
              SANCTUM_STATEFUL_DOMAINS: "training-memo.com",
              SESSION_DRIVER: "database",
              SESSION_DOMAIN: "training-memo.com",
              CACHE_DRIVER: "database",
              LOG_CHANNEL: "stderr",
              DB_CONNECTION: "mysql",
              DB_HOST: "training-memo.clc4qko0ggkz.ap-northeast-1.rds.amazonaws.com",
              DB_PORT: "3306",
              DB_DATABASE: $db_database,
              DB_USERNAME: "training0512",
              DB_PASSWORD: $db_password,
              APP_KEY: $app_key,
              MAIL_MAILER: "smtp",
              MAIL_HOST: "smtp.gmail.com",
              MAIL_PORT: "587",
              MAIL_USERNAME: "trainingMemoApp@gmail.com",
              MAIL_PASSWORD: $mail_password,
              MAIL_FROM_ADDRESS: "trainingMemoApp@gmail.com",
              MAIL_FROM_NAME: "trainingMemo",
              GOOGLE_CLIENT_ID: $google_client_id,
              GOOGLE_CLIENT_SECRET: $google_client_secret,
              RUNTIME_CLASS: "Bref\\FpmRuntime\\Main"
            }}' > /tmp/lambda-env-app.json

          aws lambda update-function-configuration \
            --function-name trainingmemo-laravel-artisan \
            --environment file:///tmp/lambda-env-artisan.json
          aws lambda wait function-updated --function-name trainingmemo-laravel-artisan

          aws lambda update-function-configuration \
            --function-name trainingmemo-laravel-app \
            --environment file:///tmp/lambda-env-app.json
          aws lambda wait function-updated --function-name trainingmemo-laravel-app

      - name: Run migrations
        run: |
          aws lambda invoke \
            --function-name trainingmemo-laravel-artisan \
            --payload '{"cli": "migrate --force"}' \
            --cli-binary-format raw-in-base64-out \
            --cli-read-timeout 0 \
            /tmp/migrate-output.json
          cat /tmp/migrate-output.json
          if grep -q '"errorMessage"' /tmp/migrate-output.json; then
            echo "::error::Migration failed"
            exit 1
          fi

      - name: Update app function code
        run: |
          aws lambda update-function-code \
            --function-name trainingmemo-laravel-app \
            --s3-bucket trainingmemo-spa-frontend \
            --s3-key backend/${{ github.sha }}.zip
          aws lambda wait function-updated --function-name trainingmemo-laravel-app
